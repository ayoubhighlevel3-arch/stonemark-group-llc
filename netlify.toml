[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/community.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/community"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/community-v2.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/community-v2"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/influencer-funnel.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/influencer-funnel"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
